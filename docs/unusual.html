<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026-06-03 异动标的</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --text: #1f2a3d;
      --muted: #64748b;
      --blue: #1f5f99;
      --blue-soft: #e9f3fb;
      --green: #2d7d62;
      --green-soft: #e7f6ef;
      --purple: #6554a5;
      --purple-soft: #f0edfb;
      --rose: #a33f61;
      --rose-soft: #fdebf1;
      --gold: #a87405;
      --gold-soft: #fff4d7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .page {
      width: min(1680px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 18px 0 26px;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-top: 4px solid var(--blue);
      border-radius: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #eef7ff 48%, #fff8e8 100%);
      box-shadow: 0 10px 24px rgba(31, 95, 153, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    .meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .refresh-note {
      max-width: 460px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      text-align: right;
    }
    .status-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 10px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
    .status-chip {
      min-height: 30px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      line-height: 1.35;
    }
    .status-chip strong {
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .status-chip.blue strong { color: var(--blue); }
    .status-chip.green strong { color: var(--green); }
    .status-chip.rose strong { color: var(--rose); }
    .status-chip.gold strong { color: var(--gold); }
    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 1.2fr) repeat(3, minmax(120px, .8fr)) auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    input, select {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 6px 9px;
      color: var(--text);
      background: #ffffff;
      font: inherit;
      font-size: 13px;
    }
    .visible-count {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      white-space: nowrap;
    }
    .table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      background: var(--panel);
      max-height: calc(100vh - 245px);
      min-height: 520px;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }
    th, td {
      padding: 8px 9px;
      border-bottom: 1px solid #edf1f6;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e9f3fb;
      color: #1d4f7d;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }
    th.sorted-asc::after { content: " ↑"; color: var(--rose); }
    th.sorted-desc::after { content: " ↓"; color: var(--rose); }
    tbody tr:nth-child(even) { background: #fafcff; }
    tbody tr:hover { background: #fff8e8; }
    .group-row td {
      position: sticky;
      top: 35px;
      z-index: 1;
      padding: 7px 10px;
      border-top: 2px solid #bfd5e8;
      border-bottom: 1px solid #bfd5e8;
      background: #f1f7fc;
      color: #1d4f7d;
      font-weight: 700;
      text-align: center;
    }
    td.name, td.industry {
      white-space: normal;
      min-width: 92px;
      max-width: 160px;
      line-height: 1.35;
    }
    td.code {
      font-weight: 700;
      color: #1d4f7d;
      font-variant-numeric: tabular-nums;
    }
    .num {
      font-variant-numeric: tabular-nums;
      text-align: center;
    }
    .strong { font-weight: 700; color: var(--rose); }
    .reason {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 46px;
      padding: 3px 7px;
      border-radius: 999px;
      color: #1d4f7d;
      background: var(--blue-soft);
      font-weight: 700;
      line-height: 1.35;
    }
    .reason-放量 { color: var(--green); background: var(--green-soft); }
    .reason-新高 { color: var(--gold); background: var(--gold-soft); }
    @media (max-width: 980px) {
      .page { width: min(100vw - 18px, 1680px); padding-top: 10px; }
      header { align-items: flex-start; flex-direction: column; }
      .refresh-note { max-width: none; text-align: left; }
      .controls { grid-template-columns: 1fr; }
      .table-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>2026-06-03 异动标的</h1>
        <div class="meta">最近交易日 2026-06-03；工作簿保存 2026-06-03 21:55:47；生成 2026-06-03 21:55:54</div>
        <div class="meta">涨幅阈值 9.5%；超额阈值 8.5%；成交阈值-5 1.5x；成交阈值-20 1.5x；PE阈值 25.0；PB阈值 2.5；YTD阈值 51.0%；924超额阈值 51.0%</div>
      </div>
      <div class="refresh-note">已自动打开 Excel/Wind 刷新公式并保存。</div>
    </header>
    <section class="status-strip" aria-label="异动统计">
      <span class="status-chip blue">入选标的 <strong>0</strong></span>
      <span class="status-chip gold">多原因标的 <strong>0</strong></span>
      <span class="status-chip rose">平均涨跌幅 <strong>-</strong></span>
      <span class="status-chip rose">平均超额 <strong>-</strong></span>
      <span class="status-chip green">入选原因：</span>
    </section>
    <section class="controls">
      <input id="searchBox" type="search" placeholder="代码 / 简称 / 行业 / 原因">
      <select id="marketFilter" aria-label="市场"><option value="全部">全部</option></select>
      <select id="reasonFilter" aria-label="入选原因"><option value="全部">全部</option></select>
      <select id="industryFilter" aria-label="行业"><option value="全部">全部</option></select>
      <div class="visible-count"><strong id="visibleCount">0</strong> / 0</div>
    </section>
    <div class="table-wrap">
      <table id="movementTable">
        <thead>
          <tr>
            <th data-sort-type="text">代码</th>
            <th data-sort-type="text">简称</th>
            <th data-sort-type="text">入选原因</th>
            <th data-sort-type="num">当日涨跌幅</th>
            <th data-sort-type="num">当日超额</th>
            <th data-sort-type="num">YTD</th>
            <th data-sort-type="num">924至今</th>
            <th data-sort-type="num">PE-TTM</th>
            <th data-sort-type="num">PB</th>
            <th data-sort-type="num">PB分位</th>
            <th data-sort-type="num">总市值</th>
            <th data-sort-type="text">市场</th>
            <th data-sort-type="text">行业</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </div>
  </div>
  <script>
    (() => {
      const body = document.querySelector('#movementTable tbody');
      const rows = Array.from(document.querySelectorAll('#movementTable tbody tr.movement-row'));
      const searchBox = document.getElementById('searchBox');
      const marketFilter = document.getElementById('marketFilter');
      const reasonFilter = document.getElementById('reasonFilter');
      const industryFilter = document.getElementById('industryFilter');
      const visibleCount = document.getElementById('visibleCount');
      const filters = [searchBox, marketFilter, reasonFilter, industryFilter];
      const applyFilters = () => {
        const query = searchBox.value.trim().toLowerCase();
        const market = marketFilter.value;
        const reason = reasonFilter.value;
        const industry = industryFilter.value;
        return rows.filter((row) => (!query || row.dataset.q.includes(query))
          && (market === '全部' || row.dataset.market === market)
          && (reason === '全部' || row.dataset.reason === reason)
          && (industry === '全部' || row.dataset.industry === industry));
      };
      const compareRows = (index, type, direction) => (a, b) => {
        const av = a.children[index].dataset.sort || a.children[index].textContent.trim();
        const bv = b.children[index].dataset.sort || b.children[index].textContent.trim();
        let result;
        if (type === 'num') {
          const an = Number(av);
          const bn = Number(bv);
          result = (Number.isFinite(an) ? an : -Infinity) - (Number.isFinite(bn) ? bn : -Infinity);
        } else {
          result = av.localeCompare(bv, 'zh-Hans-CN');
        }
        return direction === 'asc' ? result : -result;
      };
      const groupOrder = (a, b) => {
        if (activeSort && activeSort.index === 2) {
          const result = a.dataset.reason.localeCompare(b.dataset.reason, 'zh-Hans-CN');
          return activeSort.direction === 'asc' ? result : -result;
        }
        const scoreDiff = Number(b.dataset.reasonScore || 0) - Number(a.dataset.reasonScore || 0);
        if (scoreDiff) return scoreDiff;
        return a.dataset.reason.localeCompare(b.dataset.reason, 'zh-Hans-CN');
      };
      const renderRows = () => {
        const visibleRows = applyFilters();
        const grouped = new Map();
        visibleRows.forEach((row) => {
          const key = row.dataset.reason || '未分类';
          if (!grouped.has(key)) grouped.set(key, []);
          grouped.get(key).push(row);
        });
        body.textContent = '';
        const reasonKeys = Array.from(grouped.keys()).sort((a, b) => groupOrder(grouped.get(a)[0], grouped.get(b)[0]));
        reasonKeys.forEach((key) => {
          const groupRows = grouped.get(key);
          if (activeSort) groupRows.sort(compareRows(activeSort.index, activeSort.type, activeSort.direction));
          const group = document.createElement('tr');
          group.className = 'group-row';
          group.innerHTML = `<td colspan="13">${key} · ${groupRows.length}</td>`;
          body.appendChild(group);
          groupRows.forEach((row) => body.appendChild(row));
        });
        visibleCount.textContent = String(visibleRows.length);
      };
      const table = document.getElementById('movementTable');
      let activeSort = null;
      table.querySelectorAll('th').forEach((th, index) => {
        th.addEventListener('click', () => {
          const type = th.dataset.sortType || 'text';
          const direction = activeSort && activeSort.index === index && activeSort.direction === 'desc' ? 'asc' : 'desc';
          activeSort = { index, type, direction };
          table.querySelectorAll('th').forEach((item) => item.classList.remove('sorted-asc', 'sorted-desc'));
          th.classList.add(direction === 'asc' ? 'sorted-asc' : 'sorted-desc');
          renderRows();
        });
      });
      filters.forEach((item) => item.addEventListener('input', renderRows));
      renderRows();
    })();
  </script>
</body>
</html>
