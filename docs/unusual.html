<aside id="stockDetail" class="detail-float is-empty" aria-live="polite">
      <div class="detail-head">
        <div>
          <div class="detail-kicker">选中标的</div>
          <div class="detail-title"><span id="detailName">-</span><span id="detailCode">-</span></div>
          <div class="detail-sub" id="detailSub">-</div>
        </div>
        <button class="detail-close" id="detailClose" type="button" aria-label="关闭">&times;</button>
      </div>
      <section class="detail-section" id="conditionSection">
        <div class="detail-section-title">触发指标</div>
        <div class="detail-grid" id="detailMetrics"></div>
      </section>
    </aside>
  </div>
  <script>
    (() => {
      const sectionsRoot = document.getElementById('reasonSections');
      const sections = Array.from(document.querySelectorAll('.reason-section'));
      const rows = Array.from(document.querySelectorAll('tr.movement-row'));
      const searchBox = document.getElementById('searchBox');
      const marketFilter = document.getElementById('marketFilter');
      const industryFilter = document.getElementById('industryFilter');
      const conditionMode = document.getElementById('conditionMode');
      const conditionInputs = Array.from(document.querySelectorAll('input[name="conditionFilter"]'));
      const clearConditionFilters = document.getElementById('clearConditionFilters');
      const visibleCount = document.getElementById('visibleCount');
      const detailPanel = document.getElementById('stockDetail');
      const detailClose = document.getElementById('detailClose');
      const detailMetrics = document.getElementById('detailMetrics');
      const filters = [searchBox, marketFilter, industryFilter, conditionMode];
      let pinnedRow = null;
      let detailDrag = null;
      let detailManualTop = null;
      const setText = (id, value) => {
        const node = document.getElementById(id);
        if (node) node.textContent = value || '-';
      };
      const dataValue = (row, key) => row.getAttribute(`data-${key}`) || '';
      const conditionTags = (row) => (row.getAttribute('data-condition-tags') || '').split('|').filter(Boolean);
      const hasCondition = (tags, tag) => tags.includes(tag);
      const selectedConditions = () => conditionInputs.filter((item) => item.checked).map((item) => item.value);
      const conditionMatches = (row, conditions) => {
        if (!conditions.length) return true;
        const tags = conditionTags(row);
        if (conditionMode.value === 'any') return conditions.some((tag) => tags.includes(tag));
        return conditions.every((tag) => tags.includes(tag));
      };
      const metric = (label, value) => `<div class="detail-metric"><span>${label}</span><strong>${value || '-'}</strong></div>`;
      const setSelectedRow = (row) => {
        rows.forEach((item) => item.classList.toggle('is-selected', item === row));
      };
      const clampDetailTop = (top) => {
        const margin = 8;
        const maxTop = Math.max(margin, window.innerHeight - 118);
        return Math.min(Math.max(top, margin), maxTop);
      };
      const applyDetailTop = (top) => {
        const safeTop = clampDetailTop(top);
        detailPanel.style.top = `${safeTop}px`;
        detailPanel.style.maxHeight = `${Math.max(110, window.innerHeight - safeTop - 8)}px`;
        return safeTop;
      };
      const positionDetailPanel = (row = null, preferredTop = null) => {
        let top = Number.isFinite(preferredTop) ? preferredTop : 86;
        if (row && !Number.isFinite(preferredTop)) {
          const rect = row.getBoundingClientRect();
          top = rect.bottom;
        }
        detailPanel.style.left = 'auto';
        applyDetailTop(top);
        detailPanel.style.right = '';
        detailPanel.style.bottom = '';
      };
      const showDetail = (row, pinned = false, event = null) => {
        if (!row) return;
        if (pinned) {
          pinnedRow = row;
          detailManualTop = null;
        }
        setSelectedRow(pinnedRow || row);
        setText('detailName', dataValue(row, 'detail-name'));
        setText('detailCode', dataValue(row, 'detail-code'));
        setText('detailSub', `${dataValue(row, 'detail-market') || '-'} / ${dataValue(row, 'detail-industry') || '-'} / ${dataValue(row, 'reason') || '-'}`);
        const reason = dataValue(row, 'reason') || '';
        const tags = conditionTags(row);
        const metrics = [];
        if (hasCondition(tags, '日涨/超额')) {
          metrics.push(metric('当日涨幅', dataValue(row, 'detail-pct-today')));
          metrics.push(metric('当日超额', dataValue(row, 'detail-excess-today')));
        }
        if (hasCondition(tags, '3D价强')) {
          metrics.push(metric('3日涨幅', dataValue(row, 'detail-change-3d')));
          metrics.push(metric('3日超额', dataValue(row, 'detail-excess-3d')));
        }
        if (hasCondition(tags, '5D价强')) {
          metrics.push(metric('5日涨幅', dataValue(row, 'detail-change-5d')));
          metrics.push(metric('5日超额', dataValue(row, 'detail-excess-5d')));
        }
        if (hasCondition(tags, '持续放量')) {
          metrics.push(metric('近5日有效放量天数', dataValue(row, 'detail-volume-effective-days')));
          metrics.push(metric('近5日均量/前20日均量', dataValue(row, 'detail-volume-recent-ratio')));
        }
        if (hasCondition(tags, '当日放量')) {
          metrics.push(metric('当日成交量/前5日均量', dataValue(row, 'detail-volume-today-vs-prev5')));
          metrics.push(metric('当日成交量/前20日均量', dataValue(row, 'detail-volume-today-vs-prev20')));
        }
        if (hasCondition(tags, '3Y新高')) {
          metrics.push(metric('收盘价/过去3Y最高价', dataValue(row, 'detail-close-vs-high-3y')));
        }
        if (hasCondition(tags, '120D新高')) {
          metrics.push(metric('收盘价/120D最高价', dataValue(row, 'detail-close-vs-high-120d')));
        }
        if (hasCondition(tags, '60D新高')) {
          metrics.push(metric('收盘价/60D最高价', dataValue(row, 'detail-close-vs-high-60d')));
        }
        detailMetrics.innerHTML = metrics.length ? metrics.join('') : metric('入选原因', reason || '-');
        positionDetailPanel(row);
        detailPanel.classList.remove('is-empty');
      };
      const clearDetail = () => {
        pinnedRow = null;
        detailManualTop = null;
        setSelectedRow(null);
        detailPanel.classList.add('is-empty');
      };
      const beginDetailDrag = (event) => {
        if (event.target.closest('button')) return;
        const rect = detailPanel.getBoundingClientRect();
        detailDrag = {
          pointerId: event.pointerId,
          offsetY: event.clientY - rect.top,
        };
        detailPanel.classList.add('is-dragging');
        try { detailPanel.setPointerCapture(event.pointerId); } catch (error) {}
        event.preventDefault();
      };
      const moveDetailDrag = (event) => {
        if (!detailDrag || event.pointerId !== detailDrag.pointerId) return;
        detailManualTop = applyDetailTop(event.clientY - detailDrag.offsetY);
      };
      const endDetailDrag = (event) => {
        if (!detailDrag || event.pointerId !== detailDrag.pointerId) return;
        try { detailPanel.releasePointerCapture(event.pointerId); } catch (error) {}
        detailPanel.classList.remove('is-dragging');
        detailDrag = null;
      };

      const applyFilters = () => {
        const query = searchBox.value.trim().toLowerCase();
        const market = marketFilter.value;
        const industry = industryFilter.value;
        const conditions = selectedConditions();
        return rows.filter((row) => (!query || row.dataset.q.includes(query))
          && (market === '全部' || row.dataset.market === market)
          && (industry === '全部' || row.dataset.industry === industry)
          && conditionMatches(row, conditions));
      };
      const compareRows = (index, type, direction) => (a, b) => {
        const av = a.children[index].dataset.sort || a.children[index].textContent.trim();
        const bv = b.children[index].dataset.sort || b.children[index].textContent.trim();
        let result;
        if (type === 'num') {
          const an = Number(av);
          const bn = Number(bv);
          result = (Number.isFinite(an) ? an : -Infinity) - (Number.isFinite(bn) ? bn : -Infinity);
        } else {
          result = av.localeCompare(bv, 'zh-Hans-CN');
        }
        return direction === 'asc' ? result : -result;
      };
      const renderRows = () => {
        const visibleRows = applyFilters();
        const visibleSet = new Set(visibleRows);
        sections.forEach((section) => {
          const sectionRows = Array.from(section.querySelectorAll('tr.movement-row'));
          const tbody = section.querySelector('tbody');
          let count = 0;
          sectionRows.forEach((row) => {
            const isVisible = visibleSet.has(row);
            row.hidden = !isVisible;
            if (isVisible) count += 1;
          });
          if (activeSort) {
            sectionRows
              .filter((row) => !row.hidden)
              .sort(compareRows(activeSort.index, activeSort.type, activeSort.direction))
              .forEach((row) => tbody.appendChild(row));
          }
          section.hidden = count === 0;
          const countNode = section.querySelector('[data-visible-count]');
          if (countNode) countNode.textContent = String(count);
        });
        visibleCount.textContent = String(visibleRows.length);
        if (pinnedRow && !visibleSet.has(pinnedRow)) clearDetail();
      };
      let activeSort = null;
      document.querySelectorAll('.reason-table th').forEach((th) => {
        th.addEventListener('click', () => {
          const type = th.dataset.sortType || 'text';
          const columnIndex = Array.from(th.parentElement.children).indexOf(th);
          const direction = activeSort && activeSort.index === columnIndex && activeSort.direction === 'desc' ? 'asc' : 'desc';
          activeSort = { index: columnIndex, type, direction };
          document.querySelectorAll('.reason-table th').forEach((item) => item.classList.remove('sorted-asc', 'sorted-desc'));
          document.querySelectorAll(`.reason-table th:nth-child(${columnIndex + 1})`).forEach((item) => item.classList.add(direction === 'asc' ? 'sorted-asc' : 'sorted-desc'));
          renderRows();
        });
      });
      sectionsRoot.addEventListener('click', (event) => {
        const row = event.target.closest('tr.movement-row');
        if (!row) return;
        showDetail(row, true, event);
      });
      sectionsRoot.addEventListener('focusin', (event) => {
        const row = event.target.closest('tr.movement-row');
        if (row && !pinnedRow) showDetail(row, false);
      });
      detailClose.addEventListener('click', clearDetail);
      detailPanel.querySelector('.detail-head').addEventListener('pointerdown', beginDetailDrag);
      detailPanel.addEventListener('pointermove', moveDetailDrag);
      detailPanel.addEventListener('pointerup', endDetailDrag);
      detailPanel.addEventListener('pointercancel', endDetailDrag);
      window.addEventListener('resize', () => {
        if (detailPanel.classList.contains('is-empty')) return;
        if (detailManualTop === null && pinnedRow) {
          positionDetailPanel(pinnedRow);
        } else {
          const rect = detailPanel.getBoundingClientRect();
          positionDetailPanel(null, detailManualTop ?? rect.top);
        }
      });
      filters.forEach((item) => item.addEventListener('input', renderRows));
      conditionInputs.forEach((item) => item.addEventListener('change', () => {
        item.closest('.condition-chip')?.classList.toggle('is-checked', item.checked);
        renderRows();
      }));
      clearConditionFilters.addEventListener('click', () => {
        conditionInputs.forEach((item) => {
          item.checked = false;
          item.closest('.condition-chip')?.classList.remove('is-checked');
        });
        renderRows();
      });
      renderRows();
    })();
  </script>
