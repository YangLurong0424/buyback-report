<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A/H股公告概览</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d8deea;
      --text: #213047;
      --muted: #64748b;
      --blue: #2b6cb0;
      --green: #2f855a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .shell {
      width: min(1680px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 24px rgba(31, 45, 61, 0.05);
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }
    .stamp {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .tabs {
      display: inline-flex;
      gap: 8px;
      flex: 0 0 auto;
    }
    .tab-button {
      min-width: 138px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
      text-align: center;
    }
    .tab-button span {
      display: block;
      font-weight: 700;
      line-height: 1.3;
    }
    .tab-button small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
    }
    .tab-button.active {
      border-color: var(--blue);
      background: #e7f0fb;
      color: var(--blue);
    }
    .tab-button.active small {
      color: #356899;
    }
    .frame-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
      min-height: calc(100vh - 128px);
    }
    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 132px);
      min-height: 760px;
      border: 0;
      background: #ffffff;
    }
    @media (max-width: 820px) {
      .shell { width: min(100vw - 20px, 1680px); padding-top: 10px; }
      .topbar { align-items: stretch; flex-direction: column; }
      .tabs { display: grid; grid-template-columns: 1fr 1fr; }
      .tab-button { min-width: 0; }
      .tab-button small { white-space: normal; }
      iframe { height: calc(100vh - 176px); min-height: 640px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>A/H股公告概览</h1>
        <div class="stamp">生成时间：2026-04-21 14:08:30</div>
      </div>
      <nav class="tabs" aria-label="公告类型切换"><button type="button" class="tab-button" data-page="buyback.html" data-key="buyback"><span>回购</span><small>A股与港股回购预案、累计实施</small></button><button type="button" class="tab-button active" data-page="increase.html" data-key="increase"><span>增持</span><small>A股与港股增持计划、增持进展</small></button></nav>
    </header>
    <main class="frame-wrap">
      <iframe id="reportFrame" src="increase.html" title="公告报表"></iframe>
    </main>
  </div>
  <script>
    (() => {
      const frame = document.getElementById('reportFrame');
      const buttons = Array.from(document.querySelectorAll('.tab-button'));
      const setActive = (button) => {
        buttons.forEach((item) => item.classList.toggle('active', item === button));
        frame.src = button.dataset.page;
        const key = button.dataset.key || 'buyback';
        if (history.replaceState) history.replaceState(null, '', `#${key}`);
      };
      buttons.forEach((button) => button.addEventListener('click', () => setActive(button)));
      const hash = (location.hash || '').replace('#', '');
      const fromHash = buttons.find((button) => button.dataset.key === hash);
      if (fromHash) setActive(fromHash);
    })();
  </script>
</body>
</html>
