<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A/H股公告概览</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --line: #d8deea;
      --text: #213047;
      --muted: #64748b;
      --green: #2f7d5c;
      --green-soft: #e6f6ee;
      --orange: #c66828;
      --orange-soft: #fff0e5;
      --purple: #6d5aa8;
      --purple-soft: #f0edfb;
      --rose: #a94461;
      --rose-soft: #fdebf1;
      --gold: #a97913;
      --gold-soft: #fff4df;
      --blue: #1f5f99;
      --blue-soft: #e9f3fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: linear-gradient(180deg, #f7f4ee 0%, #f5f7fb 42%, #f7faf8 100%);
      color: var(--text);
    }
    .shell {
      width: min(1680px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-top: 4px solid var(--orange);
      border-radius: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #fff7ea 48%, #eef8f1 100%);
      box-shadow: 0 12px 28px rgba(83, 67, 42, 0.07);
    }
    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }
    .stamp {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .tabs {
      display: inline-flex;
      gap: 8px;
      flex: 0 0 auto;
    }
    .tab-button {
      min-width: 138px;
      border: 1px solid var(--line);
      border-left-width: 4px;
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
      text-align: center;
    }
    .tab-button span {
      display: block;
      font-weight: 700;
      line-height: 1.3;
    }
    .tab-button small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      white-space: nowrap;
    }
    .tab-button.active {
      font-weight: 700;
    }
    .tab-button.buyback {
      border-left-color: var(--orange);
    }
    .tab-button.buyback.active {
      border-color: #f0d9ad;
      border-left-color: var(--orange);
      background: var(--orange-soft);
      color: var(--orange);
    }
    .tab-button.increase {
      border-left-color: var(--purple);
    }
    .tab-button.increase.active {
      border-color: #d8d0f0;
      border-left-color: var(--purple);
      background: var(--purple-soft);
      color: var(--purple);
    }
    .tab-button.performance {
      border-left-color: var(--green);
    }
    .tab-button.performance.active {
      border-color: #cdecd9;
      border-left-color: var(--green);
      background: var(--green-soft);
      color: var(--green);
    }
    .tab-button.unusual {
      border-left-color: var(--blue);
    }
    .tab-button.unusual.active {
      border-color: #c7def0;
      border-left-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }
    .tab-button.active small {
      color: inherit;
      opacity: .82;
    }
    .frame-wrap {
      border: 1px solid var(--line);
      border-top: 4px solid var(--green);
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
      min-height: calc(100vh - 128px);
    }
    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 132px);
      min-height: 760px;
      border: 0;
      background: #ffffff;
    }
    @media (max-width: 920px) {
      .shell { width: min(100vw - 20px, 1680px); padding-top: 10px; }
      .topbar { align-items: stretch; flex-direction: column; }
      .tabs { display: grid; grid-template-columns: 1fr; }
      .tab-button { min-width: 0; }
      .tab-button small { white-space: normal; }
      iframe { height: calc(100vh - 230px); min-height: 640px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>A/H股公告概览</h1>
        <div class="stamp">生成时间：2026-04-29 20:06:25</div>
      </div>
      <nav class="tabs" aria-label="公告类型切换"><button type="button" class="tab-button buyback" data-page="buyback.html" data-key="buyback"><span>回购</span><small>A股与港股回购预案、累计实施</small></button><button type="button" class="tab-button increase" data-page="increase.html" data-key="increase"><span>增持</span><small>A股与港股拟增持、实际增持</small></button><button type="button" class="tab-button performance active" data-page="performance.html" data-key="performance"><span>业绩</span><small>A股与港股业绩预告、定期报告</small></button><button type="button" class="tab-button unusual" data-page="unusual.html" data-key="unusual"><span>异动</span><small>股票异动跟踪入选标的</small></button></nav>
    </header>
    <main class="frame-wrap">
      <iframe id="reportFrame" src="performance.html" title="公告报表"></iframe>
    </main>
  </div>
  <script>
    (() => {
      const frame = document.getElementById('reportFrame');
      const buttons = Array.from(document.querySelectorAll('.tab-button'));
      const setActive = (button) => {
        buttons.forEach((item) => item.classList.toggle('active', item === button));
        frame.src = button.dataset.page;
        const key = button.dataset.key || 'buyback';
        if (history.replaceState) history.replaceState(null, '', `#${key}`);
      };
      buttons.forEach((button) => button.addEventListener('click', () => setActive(button)));
      const hash = (location.hash || '').replace('#', '');
      const fromHash = buttons.find((button) => button.dataset.key === hash);
      if (fromHash) setActive(fromHash);
    })();
  </script>
</body>
</html>
